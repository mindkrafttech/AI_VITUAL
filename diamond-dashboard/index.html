<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Entry – Diamond Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Landing Page Specific Overrides */
      body {
        background: radial-gradient(circle at center, #111a2e 0%, #0B1120 100%);
        overflow: hidden;
      }
      
      .landing-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: relative;
      }

      /* 3D Animated Orb */
      .orb-container {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 0;
        pointer-events: auto; /* Changed to auto so we can hover it */
        /* Brownian Motion / Zero-G Jitter */
        animation: brownianMotion 12s ease-in-out infinite alternate;
      }

      @keyframes brownianMotion {
        0%   { transform: translate(0px, 0px) rotate(0deg); }
        20%  { transform: translate(-10px, 15px) rotate(2deg); }
        40%  { transform: translate(15px, -5px) rotate(-1deg); }
        60%  { transform: translate(-5px, -15px) rotate(3deg); }
        80%  { transform: translate(20px, 10px) rotate(-2deg); }
        100% { transform: translate(-15px, 5px) rotate(1deg); }
      }

      .orb {
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(34, 211, 238, 0.8), rgba(11, 17, 32, 0) 70%);
        box-shadow: 
          0 0 60px rgba(34, 211, 238, 0.4),
          inset -20px -20px 40px rgba(0, 0, 0, 0.5),
          inset 20px 20px 40px rgba(255, 255, 255, 0.2);
        animation: orbPulse 8s ease-in-out infinite, orbFloat 6s ease-in-out infinite;
        filter: blur(10px);
        transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Vacuum unfold transition */
      }

      /* Vacuum Unfold Hover Effect */
      .orb-container:hover {
        animation-play-state: paused; /* Stabilize the container jitter */
      }

      .orb-container:hover .orb {
        width: 400px;
        height: 400px;
        border-radius: 20px; /* Unfold from sphere to box */
        filter: blur(0px); /* Clear the glass */
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(34, 211, 238, 0.4);
        animation-play-state: paused; /* Stop pulsing */
      }

      /* Internal motes (invisible until hovered) */
      .orb::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: 
          radial-gradient(circle, rgba(34,211,238,0.8) 1px, transparent 1.5px),
          radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1.5px);
        background-size: 40px 40px, 60px 60px;
        background-position: 0 0, 20px 20px;
        opacity: 0;
        transition: opacity 1s ease-in;
        pointer-events: none;
      }

      .orb-container:hover .orb::before {
        opacity: 1;
        animation: dustDrift 20s linear infinite;
      }

      @keyframes dustDrift {
        from { background-position: 0 0, 20px 20px; }
        to { background-position: 400px 400px, -200px 300px; }
      }

      @keyframes orbPulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.1); opacity: 0.9; }
      }

      @keyframes orbFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }

      /* Inner energy ring */
      .orb::after {
        content: '';
        position: absolute;
        inset: 10%;
        border-radius: 50%;
        border: 2px solid rgba(230, 230, 250, 0.3); /* Soft Lavender */
        animation: orbSpin 12s linear infinite;
        filter: blur(2px);
      }

      @keyframes orbSpin {
        from { transform: rotate(0deg) scale(1); }
        to { transform: rotate(360deg) scale(1.05); }
      }

      /* Search Interface */
      .search-interface {
        z-index: 10;
        text-align: center;
        animation: fadeUpIn 1s ease-out forwards;
      }

      h1 {
        color: var(--color-lavender);
        font-weight: 500;
        font-size: clamp(2rem, 4vw, 3rem);
        margin-bottom: 2rem;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        letter-spacing: -0.5px;
      }

      /* Glowing Glass Pill Search Bar */
      .search-bar-wrapper {
        position: relative;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
      }

      .search-pill {
        width: 100%;
        padding: 1.2rem 2rem;
        font-size: 1.2rem;
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        outline: none;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 transparent;
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-sizing: border-box;
      }

      .search-pill::placeholder {
        color: rgba(230, 230, 250, 0.5); /* Soft Lavender */
      }

      .search-pill:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(34, 211, 238, 0.5); /* Electric Cyan */
        box-shadow: 
          0 8px 32px rgba(0, 0, 0, 0.4), 
          0 0 20px rgba(34, 211, 238, 0.2),
          inset 0 0 10px rgba(34, 211, 238, 0.1);
        transform: translateY(-2px);
      }

      .enter-hint {
        position: absolute;
        right: 1.5rem;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(230, 230, 250, 0.4);
        font-size: 0.85rem;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .search-pill:focus + .enter-hint,
      .search-pill:not(:placeholder-shown) + .enter-hint {
        opacity: 1;
      }

      @keyframes fadeUpIn {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="landing-container">
      <!-- 3D Orb Background -->
      <div class="orb-container">
        <div class="orb"></div>
      </div>

      <!-- Foreground Interactive Search -->
      <main class="search-interface">
        <h1>What do you want to master today?</h1>
        <div class="search-bar-wrapper">
          <input 
            type="text" 
            class="search-pill" 
            id="masteryInput" 
            placeholder="e.g. Quantum Computing, Calculus, World History..." 
            autocomplete="off"
            autofocus
          />
          <span class="enter-hint">Press Enter ↵</span>
        </div>
      </main>
    </div>

    <script>
      const input = document.getElementById('masteryInput');
      
      // Simulate intent submission
      input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && this.value.trim() !== '') {
          // Add a subtle transition effect
          document.body.style.opacity = '0';
          document.body.style.transition = 'opacity 0.8s ease-out';
          
          setTimeout(() => {
            // Navigate to the Workspace (Learning Interface)
            // Passing the query as a URL parameter for a realistic feel
            window.location.href = `workspace.html?topic=${encodeURIComponent(this.value.trim())}`;
          }, 800);
        }
      });
      
      // Dynamic orb interaction
      const orb = document.querySelector('.orb');
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 40;
        const y = (e.clientY / window.innerHeight - 0.5) * 40;
        orb.style.transform = `translate(${x}px, ${y}px)`;
      });
    </script>
    <div class="dashboard-footer fixed-br">
      Created by <span class="creator-name">S. Santhosh Kumar</span> | © Copyright Santhosh
    </div>
  </body>
</html>
